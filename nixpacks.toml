[phases.setup]
nixPkgs = [
  "chromium",
  "nss",
  "nspr",
  "atk",
  "cups",
  "dbus",
  "expat",
  "libdrm",
  "libxkbcommon",
  "mesa",
  "xorg.libX11",
  "xorg.libXcomposite",
  "xorg.libXdamage",
  "xorg.libXext",
  "xorg.libXfixes",
  "xorg.libXrandr",
  "xorg.libxcb",
  "glib",
  "gtk3",
  "pango",
  "cairo",
  "alsa-lib"
]

[phases.build]
cmds = ["npm install", "npx playwright install chromium"]

[start]
cmd = "node server.js"
